<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KINEO{% endblock %}</title>
    {% load static %}
    <link rel="icon" href="{% static 'kineo/favicon.svg' %}" type="image/svg+xml" sizes="any">
    <link rel="icon" href="{% static 'kineo/favicon.ico' %}" sizes="any">
    <link rel="icon" href="{% static 'kineo/favicon-16x16.png' %}" type="image/png" sizes="16x16">
    <link rel="icon" href="{% static 'kineo/favicon-32x32.png' %}" type="image/png" sizes="32x32">
    <link rel="icon" href="{% static 'kineo/favicon-48x48.png' %}" type="image/png" sizes="48x48">
    <link rel="icon" href="{% static 'kineo/favicon-192x192.png' %}" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="{% static 'kineo/apple-touch-icon.png' %}" sizes="180x180">
</head>
<body>
    <header>
        <a href="/" class="logo">KINEO</a>
        <nav>
            <a href="/">Movies</a>
            <a href="/sessions">Sessions</a>
            <a href="/movies/new">Add movie</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <span>KINEO © {% now "Y" %}</span>
    </footer>
</body>
</html>
