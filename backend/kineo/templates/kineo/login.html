{% extends "kineo/base.html" %}

{% block title %}Login - KINEO{% endblock %}

{% block content %}
<section class="register-page">
    <h1>Login</h1>
    <form method="post" class="register-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="register-link">No account? <a href="{% url 'register' %}">Register</a></p>
</section>
{% endblock %}
