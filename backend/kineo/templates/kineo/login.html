{% extends "kineo/base.html" %}

{% block title %}Увійти - KINEO{% endblock %}

{% block content %}
<section class="register-page">
    <h1>Увійти</h1>
    <form method="post" class="register-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Увійти</button>
    </form>
    <p class="register-link">Немає акаунту? <a href="{% url 'register' %}">Зареєструватися</a></p>
</section>
{% endblock %}
