{% extends "kineo/base.html" %}

{% block title %}{% if is_edit %}Edit{% else %}Add movie{% endif %} - KINEO{% endblock %}

{% block content %}
<section class="movie-form-section">
    <h1>{% if is_edit %}Edit movie{% else %}Add movie{% endif %}</h1>
    <form method="post" enctype="multipart/form-data" class="movie-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{% if is_edit %}Save{% else %}Add{% endif %}</button>
            <a href="{% if movie %}{% url 'movie_detail' movie.pk %}{% else %}{% url 'movie_list' %}{% endif %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
