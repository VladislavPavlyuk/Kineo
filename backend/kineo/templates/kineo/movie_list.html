{% extends "kineo/base.html" %}

{% block title %}Movies - KINEO{% endblock %}

{% block content %}
<section class="list-view">
    <h1>Movies</h1>
    <div class="movie-grid">
        {% for m in movies %}
        <a href="{% url 'movie_detail' m.pk %}" class="movie-card">
            <div class="poster-wrap">
                {% if m.poster %}
                    <img src="{{ m.poster.url }}" alt="{{ m.title }}">
                {% else %}
                    <div class="poster-placeholder">No poster</div>
                {% endif %}
            </div>
            <div class="card-info">
                <h3>{{ m.title }}</h3>
                <span class="meta">{{ m.year }} · {{ m.genre }} · {{ m.duration }} хв</span>
            </div>
        </a>
        {% empty %}
        <p class="empty">No movies</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
