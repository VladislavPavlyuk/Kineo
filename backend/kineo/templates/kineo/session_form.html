{% extends "kineo/base.html" %}

{% block title %}Add session - KINEO{% endblock %}

{% block content %}
<section class="movie-form-section">
    <h1>Add session: {{ movie.title }}</h1>
    <form method="post" class="movie-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add</button>
            <a href="{% url 'movie_detail' movie.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
